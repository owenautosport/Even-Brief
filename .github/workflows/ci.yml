name: CI

# Runs the test suite on every push / PR. No API key needed: the suite drives
# the pipeline's offline --dry-run edition, the render layer, the validation
# gate, the dedupe rules, and design-parity / asset-fidelity checks.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest -e .
      - name: Run tests
        run: python -m pytest -q
      - name: Build-gate check on the dry-run edition
        run: |
          python -m evenbrief.pipeline --dry-run --out /tmp/dryrun.json
          python -m build.render --edition /tmp/dryrun.json --check-only
